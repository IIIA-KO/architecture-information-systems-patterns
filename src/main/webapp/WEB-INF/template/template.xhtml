<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <meta charset="UTF-8" />
    <title><ui:insert name="title">Movie Catalog</ui:insert></title>
</h:head>

<h:body>
    <h:form>
        <p:menubar>
            <p:menuitem value="All Movies" icon="pi pi-list" outcome="movies.xhtml" />
            <p:menuitem value="Add Movie" icon="pi pi-plus" action="#{movieBean.prepareNewMovie()}" />
            <p:menuitem value="Submit Review" icon="pi pi-comment" outcome="submit-review.xhtml" />
            <p:menuitem value="Reviews" icon="pi pi-star" outcome="reviews.xhtml" />
        </p:menubar>
    </h:form>

    <div style="padding: 1rem;">
        <ui:insert name="content" />
    </div>
</h:body>

</html>
