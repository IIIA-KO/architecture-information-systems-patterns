<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">

<ui:composition template="WEB-INF/template/template.xhtml">
    <ui:define name="title">#{movieBean.editing ? 'Edit Movie' : 'Add Movie'}</ui:define>

    <ui:define name="content">
        <p:card>
            <f:facet name="title">#{movieBean.editing ? 'Edit Movie' : 'Add New Movie'}</f:facet>

            <h:form id="movieForm">
                <p:messages id="msgs" showDetail="true" closable="true" />

                <p:panelGrid columns="3" styleClass="ui-fluid">
                    <p:outputLabel for="titleInput" value="Title:" />
                    <p:inputText id="titleInput" value="#{movieBean.editedMovie.title}" required="true"
                                 requiredMessage="Title is required" />
                    <p:message for="titleInput" />

                    <p:outputLabel for="genreInput" value="Genre:" />
                    <p:inputText id="genreInput" value="#{movieBean.editedMovie.genre}" required="true"
                                 requiredMessage="Genre is required" />
                    <p:message for="genreInput" />

                    <p:outputLabel for="yearInput" value="Release Year:" />
                    <p:inputNumber id="yearInput" value="#{movieBean.editedMovie.releaseYear}"
                                   minValue="1888" maxValue="2030" decimalPlaces="0" required="true"
                                   requiredMessage="Release year is required" />
                    <p:message for="yearInput" />

                    <p:outputLabel for="directorInput" value="Director:" />
                    <p:inputText id="directorInput" value="#{movieBean.editedMovie.director}" />
                    <h:outputText value="" />

                    <p:outputLabel for="descriptionInput" value="Description:" />
                    <p:inputTextarea id="descriptionInput" value="#{movieBean.editedMovie.description}" rows="4" cols="40" />
                    <h:outputText value="" />
                </p:panelGrid>

                <br/>
                <p:commandButton value="Save" icon="pi pi-save" action="#{movieBean.saveMovie()}"
                                 update="movieForm" />
                <p:button value="Cancel" icon="pi pi-times" outcome="movies.xhtml" style="margin-left: 0.5rem;" />
            </h:form>
        </p:card>
    </ui:define>
</ui:composition>

</html>
